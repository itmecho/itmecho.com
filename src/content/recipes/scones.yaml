---
title: Scones
description: |
  This is a recipe for the old style National trust scones. They changed them to be vegan friendly and are now not as good!
ingredients:
  - 450g self-raising flour
  - 115g butter
  - 85g caster sugar
  - 85g sultanas
  - 1 egg
  - 75ml milk
method:
  - Preheat a fan oven to 180°C
  - Mix the butter and flour until it resembles breadcrumbs
  - Mix in the sugar and sultanas
  - Beat the egg and milk together and slowly mix into the dry ingredients until the mixture comes together
  - Make balls whatever size you like, we normally do 4-5cm diameter, then put them on a baking sheet lined with greaseproof paper
  - Bake in the over for about 15-20 minutes. This will vary depending on the size of your scones so keep an eye on them. They're done when they start turning golden brown.
  - Cool on a wire rack then enjoy!
