---
title: Pizza Dough
description: |
  This is the recipe I use to make pizza dough with my breadmaker
ingredients:
  - 315ml lukewarm water
  - 35g olive oil
  - 630g strong white flour
  - 35g caster sugar
  - 10g fast action yeast
  - 10g salt
method:
  - Put the water and oil into the breadmaker basket. Add the flour and then the sugar, yeast, and salt. Make sure that the salt stays away from the yeast as much as possible.
  - Put it in the breadmaker and run it on the dough program
  - When it's finished, turn the dough out and divide it into 4 equal balls
  - Now you're ready to roll it out, add sauce and toppings, then cook in the oven on the highest temperature!
