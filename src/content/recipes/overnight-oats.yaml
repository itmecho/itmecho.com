---
title: Overnight oats
description: |
  This is a base overnight oats recipe that you can customise however you wish!
ingredients:
  - 50g old fashioned rolled oats
  - 115g Milk
  - 60g Yogurt
  - 10g Chia seeds
  - 15-20g Maple syrup
method:
  - Mix all the ingredients together in a container with a tight fitting lid
  - Leave in the fridge overnight
  - Done!
