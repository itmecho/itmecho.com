---
title: Yorkshire puddings
description: |
  The perfect accompaniment to a roast dinner!
ingredients:
  - 1 egg
  - 50ml milk
  - 35g plain flour
method:
  - Turn the oven on to 200°C.
  - In 4 sections of a muffin tin, put enough oil to cover the bottom and then put the tin in the oven.
  - In a bowl or a jug, add the egg, milk, and then flour. Whisk it until you don't see any lumps.
  - Once the oven is up to temperature, take the tray out and pour the mixture evenly into the 4 holes.
  - Put the tray back in the oven and bake for around 20 minutes.
notes:
  - If you like your Yorkshires less crispy, you can add more milk (around 100ml instead of 50ml).
